<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Happy Birthday</title>

<style>

body{
margin:0;
padding:0;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
background:linear-gradient(135deg,#000000,#1a1a1a);
font-family:Arial;
color:white;
text-align:center;
overflow:hidden;
}

h1{
font-size:40px;
animation: glow 2s infinite alternate;
}

p{
font-size:18px;
max-width:300px;
}

button{
padding:12px 25px;
border:none;
border-radius:30px;
background:#ff4d6d;
color:white;
font-size:16px;
cursor:pointer;
margin-top:20px;
transition:0.3s;
}

button:hover{
transform:scale(1.1);
}

@keyframes glow{
from{
text-shadow:0 0 10px #ff4d6d;
}
to{
text-shadow:0 0 25px #ff99aa;
}
}

.balloon{
position:absolute;
bottom:-100px;
font-size:30px;
animation:float 8s linear infinite;
}

@keyframes float{
0%{transform:translateY(0)}
100%{transform:translateY(-120vh)}
}

</style>
</head>

<body>

<h1>🎂 Happy Birthday! 🎂</h1>

<p>
Wishing you a day filled with happiness,
laughter and unforgettable memories.
You deserve the best today and always!
</p>

<button onclick="celebrate()">Celebrate 🎉</button>

<script>

function celebrate(){
alert("🎉 Yay! Let's celebrate this special day!");
}

function createBalloon(){
let balloon=document.createElement("div");
balloon.classList.add("balloon");
balloon.innerHTML="🎈";
balloon.style.left=Math.random()*100+"vw";
balloon.style.animationDuration=5+Math.random()*5+"s";

document.body.appendChild(balloon);

setTimeout(()=>{
balloon.remove();
},8000);
}

setInterval(createBalloon,800);

</script>

</body>
</html>
